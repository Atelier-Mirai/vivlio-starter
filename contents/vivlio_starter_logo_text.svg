<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" width="400" height="60" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title>Vivlio Starter Logo (Centered)</title>
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1c5a98;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#217a42;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g font-family="Verdana, Geneva, sans-serif" font-weight="bold" font-size="50px" text-anchor="middle" dominant-baseline="middle">
    <text x="200" y="30">
      <tspan fill="url(#gradBlue)" dy="0">Vivlio</tspan>
      <tspan fill="url(#gradGreen)" dy="0"> Starter</tspan>
    </text>
  </g>
</svg>
