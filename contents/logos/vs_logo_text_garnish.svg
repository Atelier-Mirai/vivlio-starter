<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1048.82 930" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title>VS Logo with Vivlio Starter Garnish</title>
  <defs>
