<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample - figure width & align</title>

    <style>
      body {
        margin: 2rem;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        border: 1px solid #ccc;
      }

      section {
        max-width: 800px;
        margin-inline: auto;
        border: 1px solid #ccc;
      }

      h1 {
        font-size: 1.5rem;
        margin-block-end: 1rem;
      }

      p.description {
        margin-block-end: 1.5rem;
      }

      figure {
        margin-block: 1.5rem;
        margin-inline-start: 0;
        margin-inline-end: auto;
        /* 幅は inline style="width: .." で指定 */
      }

      /* 画像は常に figure の幅いっぱいに広げる */
      figure > img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #ccc;
      }

      figcaption {
        margin-block-start: 0.5rem;
        text-align: center;
        font-weight: 600;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      /* align 未指定: ブロック要素として左寄せ（デフォルト） */

      /* align=left 相当 */
      figure.align-left {
        margin-inline-start: 0;
        margin-inline-end: auto;
      }

      /* align=center 相当 */
      figure.align-center {
        margin-inline: auto;
      }

      /* align=right 相当 */
      figure.align-right {
        margin-inline-start: auto;
        margin-inline-end: 0;
      }
    </style>
  </head>
  <body>
    <section>
      <h1>画像レイアウト案3の実験</h1>
      <p class="description">
        figure 要素に <code>style="width: .."</code> を持たせ、img は常に <code>width: 100%</code> とする案3のレイアウト実験です。
      </p>

      <!-- width=30%, align 未指定 -->
      <figure style="width: 30%">
        <img src="images/55-cross-reference2/sample.png" alt="Sample 30% (no align)">
        <figcaption>30% (no align)</figcaption>
      </figure>

      <!-- width=30%, align=left -->
      <figure class="align-left" style="width: 30%">
        <img src="images/55-cross-reference2/sample.png" alt="Sample 30% left">
        <figcaption>30%left</figcaption>
      </figure>

      <!-- width=30%, align=center -->
      <figure class="align-center" style="width: 30%">
        <img src="images/55-cross-reference2/sample.png" alt="Sample 30% center">
        <figcaption>30%center</figcaption>
      </figure>

      <!-- width=50%, align=right -->
      <figure class="align-right" style="width: 50%">
        <img src="images/55-cross-reference2/sample.png" alt="Sample 50% right">
        <figcaption>50%right</figcaption>
      </figure>
    </section>
  </body>
</html>
