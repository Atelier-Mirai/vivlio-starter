    <path d="M123,20 L157,20 L187,143 L153,143 Z" fill="url(#gradV)" filter="url(#bevelV)" clip-path="url(#clipVRight)" />
    
    <path d="M174,22 C170,22 165,23 161,25 L156,27 L168,69 L173,67 C174,67 175,67 176,66 C182,63 189,61 195,61 C210,61 223,74 223,89 C223,94 221,99 219,104 L216,110 L273,110 L276,104 C281,95 283,86 283,76 C283,46 259,22 229,22 L174,22 Z M156,128 L170,128 C173,128 176,128 179,129 C187,131 193,137 193,145 C193,153 187,159 179,161 C176,162 173,162 170,162 L150,162 L137,222 L163,222 C184,222 201,205 201,184 C201,173 196,164 189,158 C196,152 201,143 201,132 C201,111 184,94 163,94 L145,94 L156,128 Z" fill="url(#gradS)" filter="url(#bevelS)" />
    
    <path d="M153,143 L142,106 C143,105 144,104 146,103 L141,89 L132,126 L123,163 Z" fill="url(#gradV)" filter="url(#bevelV)" />
