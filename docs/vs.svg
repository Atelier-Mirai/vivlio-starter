<svg width="320" height="256" viewBox="0 0 320 256" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/">
<defs>
<linearGradient id="gradV" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" style="stop-color:#A4F138;stop-opacity:1" />
<stop offset="100%" style="stop-color:#50B51E;stop-opacity:1" />
</linearGradient>

    <linearGradient id="gradS" x1="1" y1="0" x2="0" y2="1">
        <stop offset="0%" style="stop-color:#63D5F9;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#2974F4;stop-opacity:1" />
    </linearGradient>
    
    <filter id="bevelV" x="-10%" y="-10%" width="120%" height="120%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="blur" />
        <feDiffuseLighting in="blur" surfaceScale="5" diffuseConstant="1" kernelUnitLength="1,1" result="diffuse">
            <fePointLight x="-1000" y="-1000" z="500" />
        </feDiffuseLighting>
        <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1" specularExponent="20" kernelUnitLength="1,1" result="specular">
            <fePointLight x="-1000" y="-1000" z="500" />
        </feSpecularLighting>
        <feComposite in="diffuse" in2="specular" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="lit" />
        <feComposite in="lit" in2="SourceGraphic" operator="arithmetic" k1="0.1" k2="0.6" k3="1" k4="0" result="composite" />
    </filter>
    
    <filter id="bevelS" x="-10%" y="-10%" width="120%" height="120%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="1.0" result="blur" />
        <feDiffuseLighting in="blur" surfaceScale="5" diffuseConstant="1.2" kernelUnitLength="1,1" result="diffuse">
            <fePointLight x="1000" y="-1000" z="800" />
        </feDiffuseLighting>
        <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1.5" specularExponent="10" kernelUnitLength="1,1" result="specular">
            <fePointLight x="1000" y="-1000" z="800" />
        </feSpecularLighting>
        <feComposite in="diffuse" in2="specular" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="lit" />
        <feComposite in="lit" in2="SourceGraphic" operator="arithmetic" k1="0.1" k2="0.5" k3="1.1" k4="0" result="composite" />
    </filter>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.2" />
    </filter>
    
    <clipPath id="clipVRight">
        <path d="M123,20 L157,20 L187,143 L153,143 Z" />
