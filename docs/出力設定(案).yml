# プロジェクト全体の設定
project_name: mybook_starter # 出力ファイル名のベースとなる名前
version: 1.0.0               # 書籍のバージョン情報 (例: 1.0.0)
# version: 2.0.0               # 書籍のバージョン情報。未設定の場合は1.0.0が適用される。

# ファイル名へのバージョン反映設定
filename_includes_version: true # true: ファイル名にバージョンを含める / false: 省略する

## バージョン設定パターンと出力ファイル名規則
# | YAML設定のパターン | `version`の値 | `filename_includes_version` | 出力ファイル名例 | 備考 |
# | :--- | :--- | :--- | :--- | :--- |
# | **通常パターン** | `1.0.0` (デフォルト) | `true` (デフォルト) | `mybook_starter_v1.0.0.pdf` | `version`キー自体をYAMLに含めない場合も含む。 |
# | **更新時** | `2.1.0` | `true` (デフォルト) | `mybook_starter_v2.1.0.pdf` | `version: 2.1.0`と明示した場合。 |
# | **ファイル名省略** | `1.0.0` (デフォルト) | `false` | `mybook_starter.pdf` | `filename_includes_version: false`と設定した場合。 |
# | **ファイル名省略（更新）** | `2.1.0` | `false` | `mybook_starter.pdf` | `version: 2.1.0`かつ`filename_includes_version: false`と設定した場合。 |

# 出力ファイル名の例
# ターゲット	命名規則	ファイル名例
# pdf	[ProjectName]_[Version].pdf	mybook_starter_v1.0.0.pdf
# print_pdf	[ProjectName]_[Version]_print.pdf	mybook_starter_v1.0.0_print.pdf
# epub	[ProjectName]_[Version].epub	mybook_starter_v1.0.0.epub

# 出力設定
output:
  # 出力フォーマット
  target: [pdf]           # pdf / print_pdf / epub の中から yaml 配列で指定できる。
  # target:
  #   - pdf
  #   - print_pdf
  #   - epub
  # target: pdf # 単体指定も可能
  # target: pdf, print_pdf, epub   # カンマ区切りも可能

  # iPad閲覧用PDF設定（target: pdf の場合のみ有効）
  pdf:
    # 表表紙と裏表紙（ビルド後、本文PDFの前後に追加される）
    cover:
      front: frontcover.pdf  # 表表紙（.pdf / .png / .jpg / .webp）
      back: backcover.pdf    # 裏表紙（.pdf / .png / .jpg / .webp）
  
  # 印刷用PDF設定（target: print_pdf の場合のみ有効、将来構想）
  # Vivliostyle CLIの--press-readyオプションを実行する
  print_pdf:
    bleed: 3mm           # 塗り足し幅（必須）
    crop_marks: true     # トンボを付ける（任意）
    # 表表紙・裏表紙は別途入稿するため、ここでは設定不要
  
  # EPUB設定（target に 'epub' が含まれる場合のみ有効、将来構想）
  epub:
    cover: cover.jpg       # EPUBカバー画像（1枚のみ）
    
    # レイアウト形式の指定: reflowable（リフロー型）または fixed（固定レイアウト型）
    layout_type: reflowable 
    
    metadata:
      title: "はじめての技術書づくり" # 必須 
      author: "著者名"             # 必須
      language: "ja"               # 必須 (例: ja, en)
      isbn: "978-4-XXXX-XXXX-X"   # 任意（独自ISBN取得の場合。Amazon ASIN自動割り当て）
      publisher: "出版元名"       # 推奨