<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842">
  <!--
    Vivlio Starter bundled cover template: backcover.svg
    ====================================================
    配置場所: lib/vivlio/starter/templates/covers/bundled/backcover.svg

    ■ デザイナーの方へ（frontcover.svg と同様）
      CSS 変数（- -vs-xxx）でテーマカラーを調整できます。
      {{bg-from}} / {{bg-to}} は背景グラデーションの stop-color プレースホルダーです。
      {{title}} 等のテキストプレースホルダーは Vivlio Starter がビルド時に置換します。
  -->
  <defs>
    <style>
      :root {
        /* ── テーマカラー（ここを変更してテーマを調整） ── */
        --vs-text-main:    #1e3a60;
        --vs-text-sub:     #8090a8;
        --vs-text-author:  #2a4070;
        --vs-text-label:   #7080a0;
        --vs-grid-stroke:  #d0d0d0;
        --vs-stroke-outer: #e0e0e0;
        --vs-stroke-mid:   #e8e8e8;
        --vs-stroke-inner: #d0d0d0;
        --vs-node-fill:    #ffffff;
        --vs-node-stroke:  #1e3a60;
        --vs-icon-color:   #1e3a60;
      }
    </style>

    <!-- 背景グラデーション: stop-color は rsvg-convert 制限のため直接値 -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="{{bg-from}}"/>
      <stop offset="100%" stop-color="{{bg-to}}"/>
    </linearGradient>

    <!-- 細ゴールドライン（装飾罫線用） -->
    <linearGradient id="gold-thin" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c9a43a" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#e0c058"/>
      <stop offset="70%"  stop-color="#e0c058"/>
      <stop offset="100%" stop-color="#c9a43a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- === 背景 === -->
  <rect width="595" height="842" fill="url(#bg-grad)"/>

  <!-- === ゴールドフレームアクセント === -->
  <rect x="0" y="0" width="595" height="4" fill="#c9a43a"/>
  <rect x="0" y="838" width="595" height="4" fill="#c9a43a"/>
  <rect x="28" y="0" width="2" height="842" fill="#c9a43a" opacity="0.5"/>
  <rect x="565" y="0" width="2" height="842" fill="#c9a43a" opacity="0.5"/>

  <!-- === 中央グラフィック: 抽象回路 / ウェブネットワーク（中心 cy=421） === -->
  <!-- 中環 -->
  <circle cx="297" cy="421" r="140" fill="none" stroke="var(--vs-stroke-mid)" stroke-width="0.6"/>
  <!-- 内環 -->
  <circle cx="297" cy="421" r="86"  fill="none" stroke="var(--vs-stroke-inner)" stroke-width="0.5"/>

  <!-- 放射スポーク（内環 r=86 → 中環 r=140） -->
  <line x1="383" y1="421" x2="437" y2="421" stroke="var(--vs-stroke-inner)" stroke-width="0.6"/><!-- 0° -->
  <line x1="358" y1="346" x2="396" y2="308" stroke="var(--vs-stroke-inner)" stroke-width="0.6"/><!-- 45° -->
  <line x1="297" y1="335" x2="297" y2="281" stroke="var(--vs-stroke-inner)" stroke-width="0.6"/><!-- 90° -->
  <line x1="236" y1="346" x2="198" y2="308" stroke="var(--vs-stroke-inner)" stroke-width="0.6"/><!-- 135° -->
  <line x1="211" y1="421" x2="157" y2="421" stroke="var(--vs-stroke-inner)" stroke-width="0.6"/><!-- 180° -->
  <line x1="236" y1="496" x2="198" y2="534" stroke="var(--vs-stroke-inner)" stroke-width="0.6"/><!-- 225° -->
  <line x1="297" y1="507" x2="297" y2="561" stroke="var(--vs-stroke-inner)" stroke-width="0.6"/><!-- 270° -->
  <line x1="358" y1="496" x2="396" y2="534" stroke="var(--vs-stroke-inner)" stroke-width="0.6"/><!-- 315° -->

  <!-- 内環交点ノード -->
  <circle cx="383" cy="421" r="4" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.8"/>
  <circle cx="358" cy="346" r="3" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.6"/>
  <circle cx="236" cy="346" r="3" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.6"/>
  <circle cx="211" cy="421" r="4" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.8"/>
  <circle cx="236" cy="496" r="3" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.6"/>
  <circle cx="358" cy="496" r="3" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.6"/>

  <!-- 中環ノード -->
  <circle cx="437" cy="421" r="5" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.8"/>
  <circle cx="396" cy="308" r="4" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.6"/>
  <circle cx="297" cy="281" r="4" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.6"/>
  <circle cx="198" cy="308" r="4" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.6"/>
  <circle cx="157" cy="421" r="5" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.8"/>
  <circle cx="198" cy="534" r="4" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.6"/>
  <circle cx="297" cy="561" r="4" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.6"/>
  <circle cx="396" cy="534" r="4" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="0.6"/>

  <!-- 中央ノード + ブラケットアイコン -->
  <circle cx="297" cy="421" r="30" fill="var(--vs-node-fill)" stroke="var(--vs-node-stroke)" stroke-width="1.2"/>
  <text x="297" y="429" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="21" fill="var(--vs-icon-color)" font-weight="700">&lt;/&gt;</text>

  <!-- 上下の細ゴールドアクセントライン -->
  <rect x="50" y="50"  width="495" height="1" fill="url(#gold-thin)"/>
  <rect x="50" y="792" width="495" height="1" fill="url(#gold-thin)"/>
</svg>
