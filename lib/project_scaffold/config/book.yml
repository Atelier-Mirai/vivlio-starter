# =============================================================
#  📚 Vivlio Starter 書籍プロジェクト設定ガイド 📚
# -------------------------------------------------------------
#  このファイルは Vivlio Starter のブック全体の設定を管理します。
#
#  【主なセクション】
#  ── 著者が設定するセクション ──────────────────────────
#  • book         : 書籍情報（タイトル、著者、出版社など）
#  • project      : プロジェクト情報（出力ファイル名、バージョン）
#  • theme        : テーマ（アクセントカラー、扉絵、装飾スタイル）
#  • page         : ページ設定（版面レイアウト・用紙サイズ）
#  • typography   : タイポグラフィ設定（書体）
#  • legal        : リーガル情報（免責、商標）
#  • output       : 出力設定（PDF、印刷用PDF、EPUB、表紙）
#  • vfm          : Markdown 記法設定（改行の扱いなど）
#  • build        : ビルド設定（画像パス、裸URL、外部URLなどの検証）
#  ── 機能ごとの詳細設定 ────────────────────────────────
#  • index_glossary : 索引・用語集の共通設定
#  • index          : 索引の詳細設定
#  • glossary       : 用語集の詳細設定
#  • metrics        : 文章品質メトリクスの基準値
#  • lint           : 文章校正（textlint）の既定設定
#  • spellcheck     : スペルチェックの設定
#  • pdf_read       : PDF 読み取りコマンドの設定
# =============================================================

# ========================================
# 書籍情報
# ========================================
book:
  # ----------------------------
  # 書籍名
  # ----------------------------
  main_title: "{{MAIN_TITLE}}"
  subtitle: "{{SUBTITLE}}"
  subtitle_style: wave # 副題の装飾（wave | bar | none）から選択

  # ----------------------------
  # 付帯情報（任意）
  # ----------------------------
  series: "「技術書典20 新刊」" # 連載名
  release: "令和八年四月二十六日" # 発行日
  publisher: "{{PUBLISHER}}" # 発行者・サークル名（例: アトリヱ未來）。本を世に出す主体。印刷所とは別
  contact: "contact@atelier-mirai.net" # 連絡先
  author: "{{AUTHOR}}" # 著者名（本名・ペンネーム）
  language: "ja" # 言語
  isbn: "" # 任意（独自ISBN取得の場合。Kindle は ASIN 自動割り当て）

# ========================================
# プロジェクト情報
# ========================================
project:
  name: "{{PROJECT_NAME}}" # 出力ファイル名のベース
  version: "1.0.0" # 書籍のバージョン（デフォルト: 0.1.0）

# ========================================
# テーマ
# ========================================
theme:
  # ----------------------------
  # 装飾スタイル
  # ----------------------------
  style: image # image: 画像あり / simple: 画像なし

  # ----------------------------
  # テーマカラー
  # ----------------------------
  color:
    yellow # yellow / orange / red / magenta
    # purple / indigo / navy / blue
    # cyan / teal / green / lime から選択
    # '#ff0000' のような HEX 記法も指定可

  # 前書き/後書き専用カラー（オプション）
  # 指定しない場合は上記の color と同じ色が使用されます
  preface_color: indigo # 前書き/後書きだけ別の色にしたい場合に指定

  # 付録専用カラー（オプション）
  # 指定しない場合は上記の color と同じ色が使用されます
  appendix_color: yellow # 付録だけ別の色にしたい場合に指定

  # ----------------------------
  # 章扉の背景画像
  # ----------------------------
  frontispiece:
    image:
      sakura # suisen / ume / nanohana / sakura
      # suzuran / ajisai / asagao / himawari
      # kikyo / kosumosu / kiku / tsubaki から選択
      # images/内の独自画像も指定可
    padding: 10mm # 余白の調整
    heading_width: 108mm # 幅の調整
    lead_width: 88mm # 章リード文の幅の調整

  # ----------------------------
  # 節見出しの背景画像
  # ----------------------------
  ornament: sakura

  # ----------------------------
  # 見出し記号
  # ----------------------------
  markers:
    h3: "♣" # ♣ 目見出しの記号。h3見出しの前に表示される。一文字推奨。
    h4: "♦" # ♦ 号見出しの記号。h4見出しの前に表示される。一文字推奨。

# ========================================
# ページ設定（版面レイアウト）
# ========================================
page:
  # プリセットを選択（page_presets.yml から）
  # 紙サイズ、余白、文字サイズ、行送りなど版面の物理的構造を一括指定
  # use: a5_standard  # 標準
  # use: a5_airy      # 広め
  # use: a5_compact   # 狭め
  # use: a5_custom    # 著者独自

  # use: b5_standard
  # use: b5_compact
  # use: b5_airy
  # use: b5_custom

  # use: a4_standard
  # use: a4_airy
  use: a4_compact
  # use: a4_custom

# ========================================
# タイポグラフィ設定（書体・色・装飾）
# ========================================
typography:
  # ----------------------------
  # 標準添付書体（page-settings.css の @font-face で定義）
  # ----------------------------
  # - 明朝体:     Zen Old Mincho
  # - ゴシック体: Zen Kaku Gothic New
  # - 丸ゴシック体: Zen Maru Gothic
  # - プログラミング用フォント: HackGen35 Console NF
  # ※ Chromium が CFF ベース OTF / 可変フォントを Type 3 として PDF に
  #   埋め込む問題を避けるため、いずれも TrueType アウトラインの静的 TTF。
  # ※ 上記以外のフォント名を指定すると Google Fonts から自動取得を試みます。

  # ----------------------------
  # 本文
  # ----------------------------
  body:
    font: Zen Old Mincho

  # ----------------------------
  # 見出し
  # ----------------------------
  heading:
    font: Zen Kaku Gothic New

  # ----------------------------
  # コラム
  # ----------------------------
  column:
    font: Zen Maru Gothic
    font_size: 8pt # 本文より小さいため独立設定

  # ----------------------------
  # コード
  # ----------------------------
  code:
    font: HackGen35 Console NF

  # ----------------------------
  # ノンブル（ページ番号）
  # ----------------------------
  folio:
    font: Zen Kaku Gothic New
    placement: sides # center / sides

# ========================================
# リーガル（免責・商標など）
# ========================================
legal:
  # ----------------------------
  # 免責事項
  # ----------------------------
  disclaimer: |
    本書は教育目的で作成された入門書であり、情報の提供のみを目的としています。内容の正確性には万全を期しておりますが、技術的な詳細については、専門的な文献もあわせてご参照ください。
    本書の内容を参考にした結果生じた損害や、本書の内容を実行・運用・適用したことによって発生した問題について、著者・発行者および関係者は一切の責任を負いかねます。
  # ----------------------------
  # 商標に関する事項
  # ----------------------------
  trademark: |
    本書に登場するシステム名や製品名は、関係各社の商標または登録商標です。
    本書では ™、®、© などのマークは省略しています。
  # ----------------------------
  # 絵文字クレジット（Twemoji）
  # ----------------------------
  twemoji: |
    本書で使用している絵文字画像は Twemoji (https://twemoji.twitter.com) を利用しています。
    Copyright © Twitter, Inc and other contributors. Licensed under CC BY 4.0 (https://creativecommons.org/licenses/by/4.0/).

# ========================================
# 出力設定
# ========================================
output:
  # ----------------------------
  # 出力フォーマット
  # ----------------------------
  # targets: pdf # pdf / print_pdf / epub / kindleから選択可
  # 例:
  # targets: pdf                          # 閲覧用PDFを指定
  # targets: pdf, print_pdf               # 閲覧用PDF, 印刷所入稿用PDFを指定
  # targets: pdf, print_pdf, epub         # 閲覧用PDF, 印刷所入稿用PDF, 電子書籍EPUBを指定
  targets: pdf, print_pdf, epub, kindle # 閲覧用PDF, 印刷所入稿用PDF, 電子書籍EPUB, Kindle用EPUBを指定

  # ----------------------------
  # ファイル名規則
  # ----------------------------
  filename:
    # ファイル名にバージョンを含めるか
    include_version:
      true # true:  vivlio_starter_v1.0.0.pdf
      # false: vivlio_starter.pdf

  # ----------------------------
  # PDF プレビュー設定（macOS のみ）
  # ----------------------------
  pdf_preview:
    close_existing_windows: true # 既存PDFウィンドウを閉じる
    window_bounds: "{4096, 0, 5120, 2160}" # PDF表示位置とサイズ（5Kモニターの右側1/5）
    # その他の設定例:
    # window_bounds: "{0, 0, 1024, 768}"      # 左上角に小さなウィンドウ
    # window_bounds: "{1920, 0, 1920, 1080}"  # 右側モニター全画面（フルHD）

  # ----------------------------
  # 表紙・裏表紙設定
  # ----------------------------
  cover: master # covers/内の著者用意画像(frontcover_master.png, backcover_master.png)を指定
  # cover: light  # 標準添付 light 表紙・裏表紙を指定
  # cover: dark   # 標準添付 light 表紙・裏表紙を指定

  # ----------------------------
  # PDF設定（閲覧用）
  # ----------------------------
  pdf:
    combined: true # true で front/backcover を結合、false で除外
    compress:
      false # 自動圧縮を有効にするか（処理時間が増加）
      # vs build --compress / --no-compress で上書き可能
    techbook:
      true # 技術書典向け Techbook モード（既定: false）
      # true にすると、カラー絵文字を Twemoji SVG 画像に自動差し替えします。
      # Chromium の PDF エンジンが絵文字を Type 3 フォントとして埋め込む問題を回避し、
      # 技術書典入稿に適した高品質な PDF を生成します。
      # 絵文字のクレジット表記は legal.twemoji で設定してください。

  # ----------------------------
  # 印刷所 入稿用PDF設定
  # ----------------------------
  print_pdf:
    bleed: 3mm # 塗り足し幅（既定: 3mm）
    crop_marks: true # トンボを付ける（既定: true）
    # Vivliostyle CLI で --crop-marks --bleed 3mm を付加してビルド
    # 出力は PDF/X-4 準拠（ねこのしっぽ、日光企画で対応済み）
    # 隠しノンブルも PDF 結合後に自動書き込み
    # (専用gem vivlio-starter-pdf の導入を推奨)

  # ----------------------------
  # EPUB設定（楽天Kobo / Apple Books 向けクリーン EPUB）
  # ----------------------------
  epub:
    embed: true # 表紙画像を EPUB に埋め込むか（楽天/Apple向けは true 推奨）
    layout: reflowable # reflowable（リフロー型） / fixed（固定レイアウト型）
    # 注: メタデータ（title, author, language, isbn, publisher）は
    #     book セクションから自動的に流用される

  # ----------------------------
  # Kindle設定（Amazon Kindle 向け・KPF へ自動変換）
  # ----------------------------
  kindle:
    embed: false # 表紙画像を EPUB に埋め込むか（Kindle は二重表紙を避けるため false 推奨）
    layout: reflowable # reflowable（リフロー型） / fixed（固定レイアウト型）
    # 注: メタデータは book セクションから自動流用。KPF 変換は kindlepreviewer を使用。

# ========================================
# VFM マークダウン記法に関する設定
# ========================================
vfm:
  hardLineBreaks:
    true # true:  文章中の改行(エンター)を改行として処理
    # false: 文章中の改行をスペースとして処理(改行したい場合には空行または<br>)

# ========================================
# ビルドに関する設定
# ========================================
build:
  verify:
    images: true # 画像パスの存在チェック（デフォルト: true）
    bare_urls: true # 裸 URL の検出と警告（デフォルト: true）
    external_links: false # 外部 URL の HTTP 到達性チェック（デフォルト: false）
    timeout: 10 # HTTP チェックのタイムアウト秒数
    max_concurrency: 5 # HTTP チェックの最大同時接続数

# ========================================
# 索引・用語集共通設定
# ========================================
index_glossary:
  # 索引・用語集機能の有効/無効
  enabled:
    true # true: 索引と用語集の両方が有効
    # false: 索引と用語集の両方が無効

  # MeCab による読み自動推測を使用
  use_mecab: true

  # タイムゾーン (レビュー時の新着判定に利用)
  timezone: "Asia/Tokyo"

  # 文脈抽出の幅（キーワード前後の文字数）
  context_width: 40 # 小さな画面なら 20文字、大画面なら 60文字 など調整可能

  # 文脈抽出時に形態素境界で賢く文脈を引用するか
  smart_context_cutting: true

# ========================================
# 索引設定
# ========================================
index:
  # 手動登録以外の語句を自動的に探索・提案するか
  # false の場合、手動で指定した語句の抽出と読み推測のみ行います
  auto_discovery: true

  # 索引ページのタイトル
  title: "索引"

  # 自動承認スコア閾値（この値以上は自動的に index_terms.yml へ追加）
  auto_approve_threshold: 300

  # レビュー対象スコア閾値（この値以上でレビュー待ちキューへ）
  review_threshold: 150

  # 推奨候補の分割比率（上位何%をHighとするか）
  # 既定値: 0.25（25%）
  high_candidates_ratio: 0.25

# ========================================
# 用語集設定
# ========================================
glossary:
  # 用語集ページのタイトル
  title: "用語集"

  # 説明文を必須にするか
  # true の場合、[g] フラグで説明文がないとエラー
  require_definition: false

  # 説明文の最大文字数（超過した場合は警告）
  # Markdown装飾を除去した文字数で判定
  max_definition_length: 500

# ========================================
# 文章品質メトリクスの基準値
# Web/技術書の黄金律に基づいた既定値
# ========================================
metrics:
  # ----------------------------
  # 章・節の分量基準
  # ----------------------------

  # プリセットを選択
  # use: compact
  use: standard
  # use: commercial
  # use: author_custom

  # コンパクトな薄い本（20〜50ページ想定）
  compact:
    chapter:
      min: 1000 # 加筆検討ライン
      ideal: [1500, 3000] # 理想的な範囲
      max: 5000 # やや長いライン
    section:
      min: 300 # 加筆検討ライン
      ideal: [500, 1000] # 理想的な範囲
      max: 1500 # やや長いライン

  # 標準的な同人誌・技術書（100〜200ページ想定）
  standard:
    chapter:
      min: 3000 # 加筆検討ライン
      ideal: [5000, 10000] # 理想的な範囲
      max: 15000 # やや長いライン
    section:
      min: 800 # 加筆検討ライン
      ideal: [1500, 3000] # 理想的な範囲
      max: 4000 # やや長いライン

  # 商業出版レベル（200ページ以上想定）
  commercial:
    chapter:
      min: 5000 # 加筆検討ライン
      ideal: [8000, 12000] # 理想的な範囲
      max: 20000 # やや長いライン
    section:
      min: 1500 # 加筆検討ライン
      ideal: [2000, 4000] # 理想的な範囲
      max: 6000 # やや長いライン

  # 自作プリセット
  author_custom:
    chapter:
      min: 5000 # 加筆検討ライン
      ideal: [8000, 12000] # 理想的な範囲
      max: 20000 # やや長いライン
    section:
      min: 1500 # 加筆検討ライン
      ideal: [2000, 4000] # 理想的な範囲
      max: 6000 # やや長いライン

  # 分量喚起から除外する章
  exclude_chapters: [00, 90-98, 99] # 前書き、付録、後書きを除く

  # ----------------------------
  # 語彙難度の基準
  # ----------------------------
  kanji_ratio:
    min: 20 # これ未満: 平易すぎる
    ideal: [25, 35] # 実用書として理想的な範囲
    max: 45 # これ超過: 硬すぎる

  # 平均語長（文字数、MeCab分かち書き後）
  word_length:
    min: 1.5 # これ未満: 平易すぎる
    ideal: [2.0, 2.5] # 理想的な範囲
    max: 3.0 # 専門用語が多すぎる可能性

  # ----------------------------
  # 語彙多様度の基準
  # ----------------------------

  # TTR (Type-Token Ratio)
  # 異なり語数 ÷ 総語数
  ttr:
    min: 0.3 # これ未満: 表現が単調
    ideal: [0.5, 0.7] # 理想的な範囲
    max: 1.0 # 理論上の最大値

  # ----------------------------
  # 文構造の基準
  # ----------------------------

  # 平均文長（文字数/文）
  sentence_length:
    min: 20 # これ未満: 短すぎて幼稚な印象
    ideal: [40, 60] # 読みやすい長さの範囲
    max: 80 # これ超過: 長すぎて読みにくい

  # 平均節長（文字数/節）
  clause_length:
    min: 15
    ideal: [30, 40] # 理想的な範囲
    max: 50

  # ----------------------------
  # 読解難度スコア
  # ----------------------------

  # 日本語版 Flesch/Kincaid スコア
  readability:
    # スコア範囲と評価ラベルの対応
    easy: 30 # 0〜30: Easy（小中学生向け）
    standard:
      60 # 30〜60: Standard（一般ビジネス・実用書）
      # 60〜: Professional（専門家・技術者向け）

  # ----------------------------
  # 警告メッセージのカスタマイズ（オプション）
  # ----------------------------

  # 警告ラベル
  labels:
    too_short: "加筆検討"
    too_long: "やや長い"
    monotonous: "表現が単調"
    too_complex: "やや難解"

# ========================================
# Lint 設定（文章校正コマンドの既定値）
# ========================================
lint:
  # vs lint 実行時に既定で使用する textlint 設定ファイル
  # CLI で --config を指定するとこの値を一時的に上書きできます
  config: config/.textlintrc.yml

  # vs lint の既定出力フォーマット
  # CLI で --format を指定するとこの値を一時的に上書きできます
  format: stylish

# ========================================
# spellcheck 設定
# ========================================
spellcheck:
  extra_dictionaries: # オンデマンドダウンロード辞書
    # - ada                # 標準搭載以外の言語の綴り誤りも確認したい場合に指定
  extra_words: # プロジェクト固有語
    - vivliostyle
    - vivlio-starter
  ignore_words: # 誤検知を抑制したい単語
    - htmx
  check_code_blocks:
    false # コードブロック内を校正対象にするか
    # 既定値: false (校正対象にしない)

# ========================================
# pdf_read 設定
# ========================================
pdf_read:
  text_area:
    top_margin: 18 # 上端からの除外幅(mm)
    bottom_margin: 20 # 下端からの除外幅(mm)
    inner_margin: 15 # 綴じ側（奇数ページは左、偶数ページは右）除外幅(mm)
    outer_margin: 12 # 小口側の除外幅(mm)
  page_separator:
    false # true:  "---" でページ区切りを行なう
    # false: "---" でページ区切りを行なわない
  ocr:
    # OCR の実行モード:
    #   auto    : スキャンページを自動検出して必要な箇所のみ OCR
    #   force   : 全ページを必ず OCR（埋め込みテキストを無視）
    #   disable : OCR を無効化（埋め込みテキストのみ使用）
    mode: auto
    # Tesseract に渡す言語。`japanese_vertical` なども指定可。複数指定で自動的に jpn+jpn_vert を付与。
    languages:
      - japanese
    # OCR 前に生成する画像の解像度。数値を上げると精度は向上するが処理時間も増加。
    dpi: 300
    # Tesseract の PSM (Page Segmentation Mode)。章扉などの大見出しには 6、縦書き主体なら 5/7 が目安。
    psm: 3
    # イラスト内テキストの扱い:
    #   include    : 本文にそのまま含める
    #   exclude    : 画像キャプションのみ残し本文から除外
    #   captionize : キャプション化して本文のノイズを減らす
    inline_image_text: include
