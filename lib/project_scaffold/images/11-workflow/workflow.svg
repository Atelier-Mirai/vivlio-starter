<svg width="100%" viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Vivlio Starter 執筆ワークフロー概観</title>
<desc>プロジェクト作成から入稿までの5ステップを縦方向のフローチャートで示した図</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .box-teal   { fill: #E1F5EE; stroke: #0F6E56; }
    .box-purple { fill: #EEEDFE; stroke: #534AB7; }
    .box-amber  { fill: #FAEEDA; stroke: #854F0B; }
    .box-coral  { fill: #FAECE7; stroke: #993C1D; }
    .th { font-family: sans-serif; font-size: 14px; font-weight: 600; fill: #1a1a1a; }
    .ts { font-family: sans-serif; font-size: 12px; fill: #555; }
    .th-teal   { fill: #085041; }
    .th-purple { fill: #3C3489; }
    .th-amber  { fill: #633806; }
    .th-coral  { fill: #712B13; }
    .ts-teal   { fill: #0F6E56; }
    .ts-purple { fill: #534AB7; }
    .ts-amber  { fill: #854F0B; }
    .ts-coral  { fill: #993C1D; }
    .arr { stroke: #888; stroke-width: 1.5; fill: none; }
    .sub { font-family: sans-serif; font-size: 12px; fill: #777; }
  </style>
</defs>

<!-- Step 1: プロジェクト作成 -->
<rect x="180" y="30" width="320" height="72" rx="10" class="box-teal" stroke-width="0.5"/>
<text class="th th-teal" x="340" y="62" text-anchor="middle" dominant-baseline="central">① プロジェクト作成</text>
<text class="ts ts-teal" x="340" y="86" text-anchor="middle" dominant-baseline="central">vs new mybook（内部で vs doctor --fix を自動実行）</text>
<text class="sub" x="522" y="66" dominant-baseline="central">環境構築も自動</text>

<!-- 矢印 1→2 -->
<line x1="340" y1="102" x2="340" y2="138" class="arr" marker-end="url(#arrow)"/>

<!-- Step 2: 執筆 -->
<rect x="180" y="138" width="320" height="72" rx="10" class="box-teal" stroke-width="0.5"/>
<text class="th th-teal" x="340" y="166" text-anchor="middle" dominant-baseline="central">② 執筆</text>
<text class="ts ts-teal" x="340" y="190" text-anchor="middle" dominant-baseline="central">Markdown で原稿を書く（contents/*.md）</text>
<text class="sub" x="522" y="168" dominant-baseline="central">vs create</text>
<text class="sub" x="522" y="184" dominant-baseline="central">vs rename</text>

<!-- 矢印 2→3 -->
<line x1="340" y1="210" x2="340" y2="246" class="arr" marker-end="url(#arrow)"/>

<!-- Step 3: 整える -->
<rect x="180" y="246" width="320" height="72" rx="10" class="box-purple" stroke-width="0.5"/>
<text class="th th-purple" x="340" y="274" text-anchor="middle" dominant-baseline="central">③ 整える</text>
<text class="ts ts-purple" x="340" y="298" text-anchor="middle" dominant-baseline="central">文章の品質を確認・改善する</text>
<text class="sub" x="522" y="268" dominant-baseline="central">vs lint</text>
<text class="sub" x="522" y="284" dominant-baseline="central">vs metrics</text>

<!-- 繰り返し矢印（②↔③） -->
<path d="M 500 282 Q 548 282 548 210 Q 548 138 500 138" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="sub" x="564" y="216" text-anchor="middle" dominant-baseline="central">繰り返す</text>

<!-- 矢印 3→4 -->
<line x1="340" y1="318" x2="340" y2="354" class="arr" marker-end="url(#arrow)"/>

<!-- Step 4: ビルド -->
<rect x="180" y="354" width="320" height="72" rx="10" class="box-amber" stroke-width="0.5"/>
<text class="th th-amber" x="340" y="382" text-anchor="middle" dominant-baseline="central">④ ビルド</text>
<text class="ts ts-amber" x="340" y="406" text-anchor="middle" dominant-baseline="central">PDF / EPUB を生成する</text>
<text class="sub" x="522" y="376" dominant-baseline="central">vs build</text>
<text class="sub" x="522" y="392" dominant-baseline="central">vs cover *</text>

<!-- 矢印 4→5 -->
<line x1="340" y1="426" x2="340" y2="462" class="arr" marker-end="url(#arrow)"/>

<!-- Step 5: 入稿・配布 -->
<rect x="180" y="462" width="320" height="72" rx="10" class="box-coral" stroke-width="0.5"/>
<text class="th th-coral" x="340" y="490" text-anchor="middle" dominant-baseline="central">⑤ 入稿・配布</text>
<text class="ts ts-coral" x="340" y="514" text-anchor="middle" dominant-baseline="central">印刷所入稿 / 電子書籍配信</text>
<text class="sub" x="522" y="484" dominant-baseline="central">print_pdf</text>
<text class="sub" x="522" y="500" dominant-baseline="central">epub</text>

<!-- 凡例 -->
<rect x="40" y="246" width="120" height="148" rx="8" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="sub" x="100" y="266" text-anchor="middle" dominant-baseline="central">成果物</text>
<line x1="56" y1="280" x2="148" y2="280" stroke="#ddd" stroke-width="0.5"/>
<text class="sub" x="56" y="302" dominant-baseline="central">閲覧用 PDF</text>
<text class="sub" x="56" y="322" dominant-baseline="central">印刷用 PDF</text>
<text class="sub" x="56" y="342" dominant-baseline="central">EPUB</text>
<text class="sub" x="56" y="362" dominant-baseline="central">カバー画像</text>
<line x1="160" y1="390" x2="178" y2="390" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- 下部ノート -->
<text class="sub" x="340" y="556" text-anchor="middle" dominant-baseline="central">②〜③は何度でも繰り返せます。④は章単位でも実行できます（vs build 10-intro）。</text>
<text class="sub" x="340" y="574" text-anchor="middle" dominant-baseline="central">* vs cover はカバー個別生成用。未生成時は vs build が自動で呼び出します。</text>
</svg>
