<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 80" width="100%" role="img">
  <title>節見出し</title>
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="40%"  stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="outer-clip">
      <rect x="0" y="0" width="680" height="80" rx="13"/>
    </clipPath>
  </defs>
  <g clip-path="url(#outer-clip)">
    <rect x="0" y="0" width="680" height="80" fill="#ffffff"/>
    <rect x="0" y="0" width="680" height="80" fill="url(#hbg)"/>
    <rect x="0" y="0" width="14" height="80" fill="#0ea5e9"/>
  </g>
  <rect x="0.6" y="0.6" width="678.8" height="78.8" rx="12.6" fill="none" stroke="#0ea5e9" stroke-width="2.2"/>
  <rect x="48" y="16" width="102" height="48" rx="7" fill="#0ea5e9"/>
  <text x="100" y="42" font-family="'Noto Sans JP', sans-serif" font-size="24" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">1-8</text>
  <text x="164" y="42" font-family="'Noto Sans JP', sans-serif" font-size="28" font-weight="800" fill="#111111" dominant-baseline="middle">技術・教育書</text>
  <text x="410" y="42" font-family="'Noto Sans JP', sans-serif" font-size="24" font-weight="800" fill="#0ea5e9" dominant-baseline="middle">Blue</text>
  <text x="540" y="42" font-family="'Noto Sans JP', sans-serif" font-size="24" font-weight="800" fill="#111111" dominant-baseline="middle">#0ea5e9</text>
</svg>