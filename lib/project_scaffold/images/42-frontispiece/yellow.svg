<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 80" width="100%" role="img">
  <title>節見出し</title>
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="40%"  stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- 外枠と同じ角丸でクリップ -->
    <clipPath id="outer-clip">
      <rect x="0" y="0" width="680" height="80" rx="13"/>
    </clipPath>
  </defs>

  <!-- 全体を外枠の角丸でクリップ。この中に描けば自動的に角丸になる -->
  <g clip-path="url(#outer-clip)">
    <!-- white base -->
    <rect x="0" y="0" width="680" height="80" fill="#ffffff"/>
    <!-- gradient overlay -->
    <rect x="0" y="0" width="680" height="80" fill="url(#hbg)"/>
    <!-- left accent bar（直角rectでOK。clipPathが角丸にしてくれる） -->
    <rect x="0" y="0" width="14" height="80" fill="#f0a000"/>
  </g>

  <!-- outer border（clipPathの外に描くことでボーダーが欠けない） -->
  <rect x="0.6" y="0.6" width="678.8" height="78.8" rx="12.6" fill="none" stroke="#f0a000" stroke-width="2.2"/>

  <!-- badge -->
  <rect x="48" y="16" width="102" height="48" rx="7" fill="#f0a000"/>
  <!-- badge text -->
  <text x="100" y="42" font-family="'Noto Sans JP', sans-serif" font-size="24" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">1-1</text>

  <!-- section title -->
  <text x="164" y="42" font-family="'Noto Sans JP', sans-serif" font-size="28" font-weight="800" fill="#111111" dominant-baseline="middle">明るい参考書</text>
  <text x="410" y="42" font-family="'Noto Sans JP', sans-serif" font-size="24" font-weight="800" fill="#f0a000" dominant-baseline="middle">Yellow</text>
  <text x="540" y="42" font-family="'Noto Sans JP', sans-serif" font-size="24" font-weight="800" fill="#111111" dominant-baseline="middle">#f0a000</text>
</svg>