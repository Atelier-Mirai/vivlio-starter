#  • 書籍名、資格名称、専門用語など、プロジェクト固有の除外対象を記載
#  • 正規表現も使用可能（例: "/pattern/flags"）
# =============================================================

# VFM（Vivliostyle Flavored Markdown）の記法
- ":::"  # カスタムコンテナの開始/終了
- "/:::$/"  # ::: で終わる行
- "/^:::\\{/"  # :::{.class} 形式
- "/\\{[^}]+\\|[^}]+\\}/"  # ふりがな記法 {本文|ふりがな}
- "/\\{\\.[-\\w]+\\}/"  # クラス属性記法 {.classname}

