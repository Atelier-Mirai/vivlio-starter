name: 不具合報告
description: バグの報告はこちら
labels: [bug]
assignees: []
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 発生している問題の概要を簡潔に書いてください。
      placeholder: 例）ページAでボタンBを押すとエラーが出る
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 可能ならステップごとに記載してください。
      placeholder: 1) ... 2) ... 3) ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待される挙動
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の挙動
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: 実行環境
      placeholder: OS/ブラウザ/バージョンなど
  - type: textarea
    id: logs
    attributes:
      label: ログ・スクリーンショット
      description: エラーログや画面キャプチャがあれば貼り付けてください。
