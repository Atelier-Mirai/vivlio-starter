name: 機能要望
description: 新機能・改善の提案はこちら
labels: [enhancement]
assignees: []
body:
  - type: textarea
    id: summary
    attributes:
      label: 提案の概要
      placeholder: 何を実現したいかを簡潔に
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
  - type: textarea
    id: detail
    attributes:
      label: 具体的な提案内容
      placeholder: 仕様・UI・受け入れ条件など
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
  - type: textarea
    id: impacts
    attributes:
      label: 影響範囲
  - type: textarea
    id: notes
    attributes:
      label: 補足
