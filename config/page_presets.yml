# =============================================================
#  📐 Vivlio Starter ページ設定プリセット 📐
# =============================================================

# -------------------------------------------------------------
# A5 判 (148×210mm) - 少し小ぶりで持ち運びやすいサイズ
# -------------------------------------------------------------
a5_standard: &a5_std
  size: A5
  
  # タイポグラフィ設定
  base_font_size: 10pt         # 基準文字サイズ
  base_line_height: 1.7        # 行送り倍率（10pt × 1.7 = 17pt）
  letter_spacing: 0em          # 字間調整
  
  # 版面の余白（見開き対応）
  margin_top: 22mm             # 天（上余白）
  margin_bottom: 22mm          # 地（下余白）
  margin_inner: 22mm           # ノド（綴じ側、やや広めが推奨）
  margin_outer: 18mm           # 小口（外側）

a5_airy:
  <<: *a5_std
  base_line_height: 1.8        # 差分：行間を広く（ゆったり）

a5_compact:
  <<: *a5_std
  base_font_size: 9.5pt
  base_line_height: 1.6        # 差分：行間を詰める（情報量重視）
  margin_top: 18mm
  margin_bottom: 18mm

# A5 カスタムテンプレート
# 既存のプリセットでは満足できない場合、ここを自由に編集して使用してください。
# book.yml で「use: a5_custom」と指定することで適用されます。
a5_custom:
  size: A5
  
  # タイポグラフィ設定
  base_font_size: 10pt         # 基準文字サイズ
  base_line_height: 1.7        # 行送り倍率（10pt × 1.7 = 17pt）
  letter_spacing: 0em          # 字間調整
  
  # 版面の余白（見開き対応）
  margin_top: 22mm             # 天（上余白）
  margin_bottom: 22mm          # 地（下余白）
  margin_inner: 22mm           # ノド（綴じ側、やや広めが推奨）
  margin_outer: 18mm           # 小口（外側）

# -------------------------------------------------------------
# B5 判 (182×257mm) - 日本の技術書の主流サイズ
# -------------------------------------------------------------
b5_standard: &b5_std
  size: JIS-B5
  
  # タイポグラフィ設定
  base_font_size: 10.5pt       # 基準文字サイズ
  base_line_height: 1.7        # 行送り倍率（10.5pt × 1.7 = 17.85pt）
  letter_spacing: 0em          # 字間調整
  
  # 版面の余白（見開き対応）
  margin_top: 25mm             # 天（上余白）
  margin_bottom: 25mm          # 地（下余白）
  margin_inner: 25mm           # ノド（綴じ側、やや広めが推奨）
  margin_outer: 20mm           # 小口（外側）

b5_airy:
  <<: *b5_std
  base_line_height: 1.85       # 差分：行間を広く（ゆったり）
  margin_outer: 23mm           # 差分：外側の余白を少し広めに

b5_compact:
  <<: *b5_std
  base_line_height: 1.6        # 差分：行間を詰める（情報量重視）
  margin_top: 20mm
  margin_bottom: 20mm

# B5 カスタムテンプレート
# 既存のプリセットでは満足できない場合、ここを自由に編集して使用してください。
# book.yml で「use: b5_custom」と指定することで適用されます。
b5_custom:
  size: JIS-B5
  
  # タイポグラフィ設定
  base_font_size: 10.5pt       # 基準文字サイズ
  base_line_height: 1.7        # 行送り倍率（10pt × 1.7 = 17pt）
  letter_spacing: 0em          # 字間調整
  
  # 版面の余白（見開き対応）
  margin_top: 25mm             # 天（上余白）
  margin_bottom: 25mm          # 地（下余白）
  margin_inner: 25mm           # ノド（綴じ側、やや広めが推奨）
  margin_outer: 20mm           # 小口（外側）

# -------------------------------------------------------------
# A4 判 (210×297mm) - 図版の多いマニュアルや薄い本向け
# -------------------------------------------------------------
a4_standard: &a4_std
  size: A4
  
  # タイポグラフィ設定
  base_font_size: 10.5pt       # 基準文字サイズ
  base_line_height: 1.5        # 行送り倍率
  letter_spacing: 0em
  
  # 版面の余白（見開き対応）
  margin_top: 26mm             # 天（上余白）
  margin_bottom: 26mm          # 地（下余白）
  margin_inner: 26mm           # ノド（綴じ側、やや広めが推奨）
  margin_outer: 22mm           # 小口（外側）

a4_airy:
  <<: *a4_std
  base_line_height: 1.7       # 差分：行間を広く（ゆったり）

a4_compact:
  <<: *a4_std
  margin_top: 20mm
  margin_bottom: 20mm

# A4 カスタムテンプレート
# 既存のプリセットでは満足できない場合、ここを自由に編集して使用してください。
# book.yml で「use: a4_custom」と指定することで適用されます。
a4_custom:
  size: A4
  
  # タイポグラフィ設定
  base_font_size: 10.5pt       # 基準文字サイズ
  base_line_height: 1.5        # 行送り倍率（例: 1.5 は 1.5倍）
  letter_spacing: 0em          # 字間調整
  
  # 版面の余白（見開き対応）
  margin_top: 26mm             # 天（上余白）
  margin_bottom: 26mm          # 地（下余白）
  margin_inner: 26mm           # ノド（綴じ側、やや広めが推奨）
  margin_outer: 22mm           # 小口（外側）