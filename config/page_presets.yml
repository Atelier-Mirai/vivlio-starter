# =============================================================
#  📐 Vivlio Starter ページ設定プリセットガイド 📐
# -------------------------------------------------------------
#  • 使用方法（book.yml の page セクション）
#      page:
#        use: b5_standard   # 例: B5 判プリセットを適用
#        margin_top: 27mm   # 個別値で上書き可能
#  • 代表的な判型プリセットを収録しています。
# =============================================================


# B5 判 (182×257mm) - 技術書向け標準
b5_standard:
  size: B5
  base_font_size: 10.5pt    # 文字サイズ  
  # base_line_height: 17.85pt    # 行の高さ（10.5pt × 1.7 = 17.85pt）
  base_line_height: 1.7    # 行の高さ（10.5pt × 1.7 = 17.85pt）
  letters_per_line: 36      # 1行あたりの文字数（全角換算）
  lines_per_page: 35        # 1ページあたりの行数
  margin_top: 25mm          # 上余白
  margin_xshift: -4mm       # 左右マージン微調整

# B5 判 - 行間広め（読みやすさ重視）
b5_airy:
  size: B5
  base_font_size: 10.5pt    
  base_line_height: 18.9pt  # 1.8倍（10.5pt × 1.8 = 18.9pt）
  letters_per_line: 40
  lines_per_page: 36
  margin_top: 22mm
  margin_xshift: -3mm

# A5 判 (148×210mm) - 文庫本風
a5_paperback:
  size: A5
  base_font_size: 10pt     
  base_line_height: 17pt  # 1.7倍（10pt × 1.7 = 17pt）  
  letters_per_line: 35
  lines_per_page: 32
  margin_top: 20mm
  margin_xshift: -4mm

# A5 判 - コンパクト（情報量重視）
a5_compact:
  size: A5
  base_font_size: 9.5pt
  base_line_height: 15.8pt  # 1.66倍（9.5pt × 1.66 = 15.8pt）
  letters_per_line: 38
  lines_per_page: 36
  margin_top: 18mm
  margin_xshift: -5mm

# A4 判 (210×297mm) - 技術書向け標準
a4_standard:
  size: A4
  base_font_size: 12pt
  base_line_height: 19.2pt  # 1.6倍（12pt × 1.6 = 19.2pt）
  letters_per_line: 38
  lines_per_page: 36
  margin_top: 28mm
  margin_xshift: -5mm
