# =============================================================
#  📐 Vivlio Starter ページ設定プリセットガイド 📐
# -------------------------------------------------------------
#  • 使用方法（book.yml の page セクション）
#      page:
#        use: b5_standard   # 例: B5 判プリセットを適用
#
#  • 版面設計の考え方
#    1. 紙サイズと余白を指定
#    2. 文字サイズと行送りを指定
#    3. 文字数・行数は自動計算されます
#
#  • 余白の用語
#    - margin_top: 天（上余白）
#    - margin_bottom: 地（下余白）
#    - margin_inner: ノド（綴じ側の余白、左右ページで自動的に位置が変わる）
#    - margin_outer: 小口（外側の余白、左右ページで自動的に位置が変わる）
# =============================================================


# B5 判 (182×257mm) - 技術書向け標準
b5_standard:
  size: B5
  
  # タイポグラフィ設定
  base_font_size: 10.5pt       # 基準文字サイズ
  base_line_height: 1.7        # 行送り倍率（10.5pt × 1.7 = 17.85pt）
  letter_spacing: 0em          # 字間調整
  
  # 版面の余白（見開き対応）
  margin_top: 25mm             # 天
  margin_bottom: 25mm          # 地
  margin_inner: 25mm           # ノド（綴じ側、やや広めが推奨）
  margin_outer: 20mm           # 小口（外側）
  
  # 参考: 自動計算される値
  # 版面サイズ: 137mm × 207mm
  # 1行あたり: 約36文字
  # 1ページあたり: 約35行

# B5 判 - 行間広め（読みやすさ重視）
b5_airy:
  size: B5
  base_font_size: 10.5pt
  base_line_height: 1.8        # 1.8倍（10.5pt × 1.8 = 18.9pt）
  letter_spacing: 0em
  margin_top: 28mm
  margin_bottom: 28mm
  margin_inner: 28mm
  margin_outer: 23mm

# A5 判 (148×210mm) - 文庫本風
a5_paperback:
  size: A5
  base_font_size: 10pt
  base_line_height: 1.7        # 1.7倍（10pt × 1.7 = 17pt）
  letter_spacing: 0em
  margin_top: 22mm
  margin_bottom: 22mm
  margin_inner: 22mm
  margin_outer: 18mm

# A5 判 - コンパクト（情報量重視）
a5_compact:
  size: A5
  base_font_size: 9.5pt
  base_line_height: 1.66       # 1.66倍（9.5pt × 1.66 = 15.77pt）
  letter_spacing: 0em
  margin_top: 20mm
  margin_bottom: 20mm
  margin_inner: 20mm
  margin_outer: 16mm

# A4 判 (210×297mm) - 技術書向け標準（ややコンパクト）
a4_standard:
  size: A4
  base_font_size: 11pt
  base_line_height: 1.6        # 1.6倍（11pt × 1.6 = 17.6pt）
  letter_spacing: 0em
  margin_top: 30mm
  margin_bottom: 30mm
  margin_inner: 28mm
  margin_outer: 22mm
