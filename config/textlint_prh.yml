# =============================================================
#  📝 prh 表記ゆれ辞書 - Vivlio Starter
# -------------------------------------------------------------
#  • textlint-rule-prh で使用する表記揺れ修正ルールを定義
#  • .textlintrc.yml の prh.rulePaths で読み込まれる
#  • expected: 修正後の表記, patterns: 修正対象の表記リスト
# =============================================================

version: 1
rules:
  # ----------------------------------------------
  # ルール1: 正式名称（Vivlio Starter）の統一
  # ----------------------------------------------
  - expected: Vivlio Starter
    # 大文字・小文字やスペースが意図せず崩れた表記を修正対象とする
    patterns:
      - 'vivlio starter'  # 小文字とスペース
      - 'VivlioStarter'   # スペースなし（キャメルケースのような形式）
      - 'vivliostarter'   # 完全な小文字・スペースなし
      - 'VIVLIO STARTER'  # 全て大文字

  # ----------------------------------------------
  # ルール2: コマンド名（vivlio-starter）の統一
  # ----------------------------------------------
  - expected: vivlio-starter
    patterns:
      - 'vivlio_starter'
      - 'vivliostarter'

  - expected: Vivlio Starter
    patterns:
      - /vivlio-starter/

  # ----------------------------------------------
  # ルール3: よくある一般的な表記ゆれ（例: ユーザ vs ユーザー）
  # ----------------------------------------------
  - expected: ユーザー
    patterns:
      - 'ユーザ'
      - 'ユーザーさん' # ユーザーの後に続く不要な敬称を修正したい場合
  
  # ----------------------------------------------
  # ルール4: 技術用語の表記ゆれ（例: javascript vs JavaScript）
  # ----------------------------------------------
  - expected: JavaScript
    patterns:
      - 'javascript'
      - 'Javascript'
  
  # ----------------------------------------------
  # ルール5: 誤字・脱字の修正（「〜したいと想います」の修正など）
  # ----------------------------------------------
  - expected: 思います
    patterns:
      - '想います'
  
  # ----------------------------------------------
  # ルール6: 全角/半角スペースの統一（特定の単語の直後の統一）
  # ----------------------------------------------
  - expected: 'GitHub Actions'
    patterns:
      - 'GitHubActions'

  # ==============================================================
  # OCR 固有の誤認識修正ルール
  # ==============================================================

  # OCR が AI を Al (エル) と誤読する
  - expected: AI
    patterns:
      - /\bAl\b/
      - /\bAl(?=[\s（(（])/

  # OCR が「人工」を「入工」と誤読する
  - expected: 人工知能
    patterns:
      - '入工知能'

  # OCR が先頭の「プ」を欠落させる
  - expected: プログラミング
    patterns:
      - /(?<![ァ-ヶー])ログラミング/

  # OCR が「ウェブ」を「ウェプ」と誤読する
  - expected: ウェブ
    patterns:
      - 'ウェプ'

  # OCR が「テキスト」を「テチキスト」と誤読する
  - expected: テキスト
    patterns:
      - 'テチキスト'

  # OCR が「語彙」を「語芸」と誤読する
  - expected: 語彙
    patterns:
      - '語芸'