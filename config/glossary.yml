# 用語と表記ルールのための用語集
# - key: 内部識別子（snake_case）
# - name: 初出で用いる正規の名称
# - abbr: 初出以降に用いる短縮形（不要なら null）
# - first_full_form: true の場合、初出は「name（abbr）」を用いる
# - description: 簡単な説明（任意）
# - aliases: リント対象となる別表記/ニックネーム（任意）
# - style: 表記ルールのヒント
#   - 目的: `aliases` をすべて書かなくても代表的な表記ゆれを検出・修正する指針
#   - 値の例:
#     - capitalization: 大文字小文字を正規表記（`name`/`abbr`）に統一（HTML/PDF など）
#     - lowercase: 小文字表記に統一（例: `gem`）
#     - hyphenation: ハイフン有無を統一（例: `vivlio-starter`）
  #     - spacing: スペースの有無/種別（将来拡張）
  #     - punctuation: 記号（コロン/ハイフン等）の種別や位置（将来拡張）
#     - wording: 語彙選択の指針（自動修正しません）
#   - 現状の自動チェック/修正対象: capitalization / lowercase / hyphenation

---
terms:
  - key: build
    name: ビルド
    abbr:
    first_full_form: false
    description: |-
      原稿とスタイルから成果物（PDF/HTML等）を生成する工程。
    aliases: [ビルドする, ビルド手順]
    style: wording

  - key: chapter
    name: 章
    abbr:
    first_full_form: false
    description: |-
      書籍の構成単位。ファイル名は先頭に番号を付す慣習。
    aliases: [チャプター]
    style: wording

  - key: css
    name: Cascading Style Sheets
    abbr: CSS
    first_full_form: false
    description: |-
      ウェブページの見た目（色、フォント、レイアウトなど）を定義するためのスタイルシート言語
      HTMLと組み合わせてコンテンツに装飾を加え、JavaScriptと組み合わせて動的な表現を実現
    aliases: [css, Css]
    style: capitalization

  - key: css_typesetting
    name: CSS組版
    abbr:
    first_full_form: false
    description: |-
      HTML/CSSを用いてページレイアウトを行う手法。
    aliases: [CSS 組版]
    style: spacing

  - key: gem
    name: gem
    abbr:
    first_full_form: false
    description: |-
      RubyGemsのパッケージ（小文字表記を推奨）。
    aliases: [Gem, Gems]
    style: lowercase

  - key: html
    name: HyperText Markup Language
    abbr: HTML
    first_full_form: true
    description: |-
      ウェブページのコンテンツと構造を記述するためのマークアップ言語
    aliases: [html, Html]
    style: capitalization

  - key: markdown
    name: Markdown
    abbr:
    first_full_form: false
    description: |-
      プレーンテキストベースの軽量マークアップ言語。
    aliases: [markdown, MarkDown]
    style: capitalization

  - key: pdf
    name: Portable Document Format
    abbr: PDF
    first_full_form: true
    description: |-
      Portable Document Format。書籍の最終出力形式として想定。
    aliases: [pdf, Pdf]
    style: capitalization

  - key: rake
