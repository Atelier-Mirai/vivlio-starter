# =============================================================
#  📚 Vivlio Starter 書籍プロジェクト設定ガイド 📚
# -------------------------------------------------------------
#  • このファイルは Vivlio Starter のブック全体の設定を管理します。
#  • 主なセクション: book, chapters, theme, page, legal,
#                    directories, commands, files, vivliostyle, pdf
# =============================================================

# 書籍情報
book:
  # 書籍名
  main_title: 'はじめての技術書づくり'
  subtitle: 'Vivlio Starter 実践ガイド'
  subtitle_style: wave  # 副題の装飾（wave | bar | none）から選択

  # 付帯情報（任意）
  series: '技術書典 19 新刊'            # 連載名
  release: '令和七年十一月十五日 初版発行' # 発行日
  publisher: '○○印刷所'                # 日光企画 ねこのしっぽ
  contact: 'haruka@example.com'       # 連絡先
  author: '早乙女遙香'                  # 著者名
  language: 'ja'                      # 言語

# ビルド対象にする章の指定
chapters: all # 全ての章を対象

# chapters:       # 一部の章のみを対象としたい場合は、以下のように指定します。
  # - 11-install  # 拡張子(.md)は、省略できます。
  # - 12-tutorial

# テーマ
theme:
  # 章扉や節見出しの装飾スタイル
  style: simple     # image: 画像あり / simple: 画像なし

  # テーマカラー
  color: yellow      # yellow / amber / orange / peach
                   # coral / red / magenta / plum
                   # purple / indigo / navy / blue
                   # cyan / teal / mint / green / lime から選択
                   # ff0000 のような HEX 記法も指定可

  # 付録専用カラー（オプション）
  # 指定しない場合は上記の color と同じ色が使用されます
  appendix_color: cyan  # 付録だけ別の色にしたい場合に指定

  # 章扉の背景画像
  frontispiece: 
    # image: bundled/himawari_portrait   # 主ファイル名 stylesheets/images/sunflower.webp を指す
    image: himawari   # 主ファイル名 stylesheets/images/sunflower.webp を指す
    padding: 10mm
    heading_width: 120mm
    lead_width: 120mm

  # 節見出しの背景画像
  # ornament: bundled/himawari_landscape   # stylesheets/images/sunflower_landscape.webp を指す
  # ornament: sunflower_landscape   # stylesheets/images/sunflower_landscape.webp を指す
  ornament: himawari   # stylesheets/images/sunflower_landscape.webp を指す

  # 目や号の見出し記号
  markers: 
    h3: ♣ # 目見出しの記号。h3見出しの前に表示される。一文字推奨。
    h4: ♦ # 号見出しの記号。h4見出しの前に表示される。一文字推奨。

# ページ設定
page:
  # page_presets.yml の b5_standard プリセットを適用する
  # use: a5_paperback
  # use: b5_standard
  use: a4_standard


  # 紙サイズ（A4 / B5 / A5）。指定すると幅・高さが自動設定されます。
  # size: A4
  # # 任意: 自動設定を上書きしたいときのみ指定
  # # width: '210mm'
  # # height: '297mm'

  # # 基本文字サイズ（Q: 和文組版の単位。1Q ≒ 0.25mm ≒ 0.709pt）
  # base_font_size: '17Q'
  # # 行送り（ベースライン間隔）。例: 27.2Q は 17Q × 1.6倍相当
  # base_line_height: '27.2Q'

  # # 1行の想定文字数（全角換算）
  # letters_per_line: '38'
  # # 1ページの想定行数
  # lines_per_page: '36'

  # # 上余白（天マージン）。下余白は版面計算で自動算出
  # margin_top: '28mm'
  # # 左右マージンの微調整（負で左へ、正で右へシフト）
  # margin_xshift: '-5mm'


  # 標準添付書体
  # 明朝体	Noto Serif JP
  # ゴシック体	Noto Sans JP
  # 丸ゴシック体 Zen Maru Gothic
  # プログラミング用フォント hackgen35

  # 本文用フォント
  main_text_font: Noto Serif JP
  # main_text_font: Hachi Maru Pop
  # 見出し用フォント
  header_font: Noto Sans JP
  # header_font: Rampart One
  # コラム用フォント
  column_font: Zen Maru Gothic
  # コード用フォント
  code_font: hackgen35
  # code_font: Zen Maru Gothic
  # ノンブル（ページ番号）用フォント
  folio_font: Noto Sans JP

  # コラム（補足欄など）のフォントサイズ
  column_font_size: '10.5Q'
  # ノンブルのフォントサイズ
  folio_font_size: 13Q
  # ノンブルの色（CSSカラー値）
  folio_color: '#666'

  # ノンブル配置（center=中央/ sides=左右）
  folio_placement: center

# リーガル（免責・商標など）
legal:
  # 免責事項（Markdown可、複数段落可）
  disclaimer: |
    本書は教育目的で作成された入門書であり、情報の提供のみを目的としています。内容の正確性には万全を期しておりますが、技術的な詳細については、専門的な文献もあわせてご参照ください。
    本書の内容を参考にした結果生じた損害や、本書の内容を実行・運用・適用したことによって発生した問題について、著者・発行者および関係者は一切の責任を負いかねます。

  # 商標に関する事項（Markdown可、複数段落可）
  trademark: |
    本書に登場するシステム名や製品名は、関係各社の商標または登録商標です。
    本書では ™、®、© などのマークは省略しています。

# PDF設定
pdf:
  # 出力PDFファイル名
  output_file: 'output.pdf'
  # 圧縮PDFファイル名（rake pdf:compress の既定値）
  output_file_compressed: 'output_compressed.pdf'
  # Vivliostyleビルド時のコンソール出力を抑制（ENV VIVLIO_QUIET=1 でも可）
  quiet: true
  
  # PDFを開く際のウィンドウ位置とサイズ（macOSのみ）
  # 形式: "{x, y, width, height}"
  # x, y: 左上角の座標
  # width, height: ウィンドウのサイズ
  # window_bounds: "{3072, 0, 4096, 2160}"  # 右側モニター全画面
  window_bounds: "{4096, 0, 5120, 2160}"  # 右側モニター全画面

  # その他の設定例:
  # output_file: '電気・電子技術への招待.pdf'  # 日本語ファイル名
  # output_file: 'book_v1.0.pdf'                      # バージョン付き
  # window_bounds: "{0, 0, 1024, 768}"                # 左上角に小さなウィンドウ
  # window_bounds: "{1920, 0, 1920, 1080}"            # 右側モニター全画面（フルHD）
  # window_bounds: "{960, 270, 960, 540}"             # 画面中央に中サイズ
  
  # Previewアプリの既存ウィンドウを閉じるかどうか
  close_existing_windows: true

# ディレクトリ設定
directories:
  contents: 'contents'        # Markdownファイル
  stylesheets: 'stylesheets' # CSSファイル
  images: 'images'           # 画像ファイル
  codes: 'codes'             # ソースコードファイル
  chapter_templates: 'chapter_templates'     # 章テンプレートファイル

# キャッシュ設定
cache:
  enabled: true
  dir: .cache/vs/

# コマンド設定
commands:
  vfm: 'vfm'                 # VFM（Vivliostyle Flavored Markdown）コマンド

# ファイル設定
files:
  post_replace: '_post_replace_list.yml'  # 後処理用置換リストファイル

# Vivliostyle設定
vivliostyle:
  # 読み進め方向
  reading_progression: 'ltr'  # 'ltr': 左から右へ（横書き）, 'rtl': 右から左へ（縦書き）
  # エントリーファイル
  entries_file: 'entries.js'
  # 設定ファイル名
  config_file: 'vivliostyle.config.js'


