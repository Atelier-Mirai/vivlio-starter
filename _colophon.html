<!DOCTYPE html><html lang="ja"><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="stylesheets/theme.css">
    <link rel="stylesheet" href="stylesheets/colophon.css">
    <link rel="stylesheet" href="stylesheets/custom.css">
  
<!-- Vivlio Starter Techbook CSS BEGIN -->
<style>
/* Vivlio Starter: techbook emoji style */
img.vs-emoji {
  display: inline;
  width: 1em;
  height: 1em;
  vertical-align: -0.15em;
  border: none !important;
  box-shadow: none;
  background: transparent;
  padding: 0;
  margin: 0;
}

/* Techbook: CSS 擬似要素のマーカー記号を画像化
   記号を CSS 文字列として描画すると Chromium が Type 3
   フォントとして埋め込むため、Twemoji WebP の url() に置き換える。 */
:root {
  --h3-marker: url("stylesheets/twemoji/vs-techbook/marker-h3.webp") !important;
  --h4-marker: url("stylesheets/twemoji/vs-techbook/marker-h4.webp") !important;
  --subtitle-wave-image: url("stylesheets/twemoji/vs-techbook/wave.webp") !important;
  --code-font: var(--font-code);
}

.subsection-marker,
h4::before {
  display: inline-block;
  inline-size: 1em;
  block-size: 1em;
  margin-inline-end: 1mm;
  vertical-align: -0.15em;
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}

.subsection-marker {
  background-image: var(--h3-marker) !important;
}

h4::before {
  content: "" !important;
  background-image: var(--h4-marker) !important;
}

/* Techbook: CSS文字列の波線装飾は Type 3 化しやすいため画像化する。 */
.subtitle--wave {
  --subtitle-prefix: "" !important;
  --subtitle-suffix: "" !important;
}

.subtitle--wave::before,
.subtitle--wave::after {
  content: "" !important;
  display: inline-block;
  inline-size: 0.9em;
  block-size: 0.9em;
  margin-inline: 0.12em;
  vertical-align: -0.12em;
  background-image: var(--subtitle-wave-image);
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}

/* --code-font 未定義時のOS既定 monospace fallback（Osaka等）を避ける。 */
code,
pre,
code[class*="language-"],
pre[class*="language-"] {
  font-family: var(--font-code), monospace !important;
  text-shadow: none !important;
}

</style>
<!-- Vivlio Starter Techbook CSS END -->
</head>
  <body class="colophon">
    <h1 class="book-title vs-h-marker" data-heading="はじめての技術書づくり" data-h1="はじめての技術書づくり" id="はじめての技術書づくり" data-chapter="_colophon">はじめての技術書づくり</h1>
    <p class="subtitle subtitle--wave">Vivlio Starter 実践ガイド</p>
    <p class="publication-info">令和八年四月二十六日</p>
    <dl class="info-list">
      <dt>著者</dt>
      <dd>アトリヱ未來</dd>
      <dt>発行者</dt>
      <dd>早乙女 遙香</dd>
      <dt>連絡先</dt>
      <dd>contact@atelier-mirai.net</dd>
    </dl>
    <p class="copyright"><small><img src="stylesheets/twemoji/a9.webp" alt="©" class="emoji vs-emoji" width="1em" height="1em" style="vertical-align: -0.15em;"> 令和八年 アトリヱ未來 All rights reserved.</small></p>
    <p class="powered-by"><small>(powered by Vivlio Starter)</small></p>
  


</body></html>
