  # この 2 行は vs index:auto へのオンボーディング導線として意図的に表示
  # している案内であり、品質警告ではないため許容する（2026-06-12 棚卸し）。
  - "原稿に [用語|読み] という書き方で手動登録した語のみが索引に載ります"
  - "自動索引機能を有効にするには: vs index:auto -> vs index:apply"
