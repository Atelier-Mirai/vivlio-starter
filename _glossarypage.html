<!-- Vivlio Starter Techbook CSS BEGIN -->
<style>
/* Vivlio Starter: techbook emoji style */
img.vs-emoji {
  display: inline;
  width: 1em;
  height: 1em;
  vertical-align: -0.15em;
  border: none !important;
  box-shadow: none;
  background: transparent;
  padding: 0;
  margin: 0;
}

/* Techbook: CSS 擬似要素のマーカー記号を画像化
   記号を CSS 文字列として描画すると Chromium が Type 3
   フォントとして埋め込むため、Twemoji WebP の url() に置き換える。 */
:root {
  --h3-marker: url("stylesheets/twemoji/vs-techbook/marker-h3.webp") !important;
  --h4-marker: url("stylesheets/twemoji/vs-techbook/marker-h4.webp") !important;
  --subtitle-wave-image: url("stylesheets/twemoji/vs-techbook/wave.webp") !important;
  --code-font: var(--font-code);
}

.subsection-marker,
h4::before {
  display: inline-block;
  inline-size: 1em;
  block-size: 1em;
  margin-inline-end: 1mm;
  vertical-align: -0.15em;
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}

.subsection-marker {
  background-image: var(--h3-marker) !important;
}

h4::before {
  content: "" !important;
  background-image: var(--h4-marker) !important;
}

/* Techbook: CSS文字列の波線装飾は Type 3 化しやすいため画像化する。 */
.subtitle--wave {
  --subtitle-prefix: "" !important;
  --subtitle-suffix: "" !important;
}

.subtitle--wave::before,
.subtitle--wave::after {
  content: "" !important;
  display: inline-block;
  inline-size: 0.9em;
  block-size: 0.9em;
  margin-inline: 0.12em;
  vertical-align: -0.12em;
  background-image: var(--subtitle-wave-image);
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}

/* --code-font 未定義時のOS既定 monospace fallback（Osaka等）を避ける。 */
code,
pre,
code[class*="language-"],
pre[class*="language-"] {
  font-family: var(--font-code), monospace !important;
  text-shadow: none !important;
}

</style>
<!-- Vivlio Starter Techbook CSS END -->
</head>
